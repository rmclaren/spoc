observations:
- obs space:
    name: "AIRCFT"
    simulated variables: ['airTemperature','specificHumidity','windNorthward','windEastward']
    obsdatain:
      engine:
        type: bufr
        obsfile: "./testinput/2021080100/gdas.t00z.prepbufr.acft_profiles"
        mapping file: "./prepbufr_acft_profiles.yaml"
    obsdataout:
      engine:
        type: H5File
        obsfile: "./testoutput/2021080100/bufr4backend/gdas.t00z.acft_profiles_prepbufr.tm00_mpi4.nc"
