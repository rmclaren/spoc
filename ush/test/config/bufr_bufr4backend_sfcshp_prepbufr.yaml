time window:
  begin: "1969-07-31T21:00:00Z"
  end: "2021-08-01T03:00:00Z"
  bound to include: begin

observations:
- obs space:
    name: "SFCSHP"
    simulated variables: ['stationPressure','airTemperature','virtualTemperature','specificHumidity','windNorthward','windEastward']
    obsdatain:
      engine:
        type: bufr
        obsfile: "./testinput/2021080100/gdas.t00z.prepbufr"
        mapping file: "./prepbufr_sfcshp.yaml"
    obsdataout:
      engine:
        type: H5File
        obsfile: "./testoutput/2021080100/bufr4backend/gdas.t00z.sfcshp_prepbufr.tm00.nc"
