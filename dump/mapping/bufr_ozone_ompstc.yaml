bufr:
  variables:
    # MetaData
    timestamp:
      datetime:
        year: "*/YEAR"
        month: "*/MNTH"
        day: "*/DAYS"
        hour: "*/HOUR"
        minute: "*/MINU"
        second: "*/SECO"

    latitude:
      query: "*/CLAT"

    longitude:
      query: "*/CLON"

    satelliteId:
      query: "*/SAID"

    fieldOfViewNumber:
      query: "*/FOVN"

    solarZenithAngle:
      query: "*/SOZA"

    # Quality Information 
    bestOzoneAlgorithmFlag:
      query: "*/AFBO"

    totalOzoneQualityCode:
      query: "*/TOQC"

    # ObsValue
    ozoneTotal:
      query: "*/OZON"

  splits:
    satId:
      category:
        variable: satelliteId
        map:
          _224: npp
          _225: n20
          _226: n21

encoder:
  globals:
    - name: "description"
      type: string
      value: "Total Column Ozone derived from the ultraviolet, visible and  near-infrared observations (between 300-380 nm) made by the OMPS Nadir Total Column Mapper on Suomi-NPP and JPSS at a spatial resolution of 50 km at nadir"

    - name: "platformCommonName"
      type: string
      value: "JPSS"

    - name: "platformLongDescription"
      type: string
      value: "Joint Polar Satellite System"

    - name: "sensorCommonName"
      type: string
      value: "OMPSNM"

    - name: "sensorLongDescription"
      type: string
      value: "Ozone Mapping and Profiler Suite - Nadir Mapper"

    - name: "source"
      type: string
      value: "U.S. National Weather Service, National Centers for Environmental Prediction (NCEP))"

    - name: "sourceFiles"
      type: string
      value: "NCEP BUFR Dump - ompst8 NC008018"

    - name: "processingLevel"
      type: string
      value: "Level-2"

    - name: "converter"
      type: string
      value: "bufr-query"

  variables:
    # MetaData
    - name: "MetaData/dateTime"
      source: variables/timestamp
      longName: "Datetime"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/latitude"
      source: variables/latitude
      longName: "Latitude"
      units: "degree_north"
      range: [-90, 90]

    - name: "MetaData/longitude"
      source: variables/longitude
      longName: "Longitude"
      units: "degree_east"

    - name: "MetaData/satelliteIdentifier"
      source: variables/satelliteId
      longName: "Satellite Identifier"

    - name: "MetaData/sensorScanPosition"
      source: variables/fieldOfViewNumber
      longName: "Field of View Number"

    - name: "MetaData/solarZenithAngle"
      source: variables/solarZenithAngle
      longName: "Solar Zenith Angle"
      units: "degree"
      range: [0, 180]

    # Quality Information
    - name: "MetaData/bestOzoneAlgorithmFlag"
      source: variables/bestOzoneAlgorithmFlag
      longName: "Algorithm Flag for Best Ozone Retrievals"

    - name: "MetaData/totalOzoneQualityCode"
      source: variables/totalOzoneQualityCode
      longName: "OMI Total Ozone Quality Code"

    # ObsValue
    - name: "ObsValue/ozoneTotal"
      source: variables/ozoneTotal
      longName: "Total Column Ozone"
      units: "DU"
