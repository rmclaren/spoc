bufr:
  subsets:
    - NC005072

  variables:
    # MetaData
    timestamp:
      datetime:
        year: "*/YEAR"
        month: "*/MNTH"
        day: "*/DAYS"
        hour: "*/HOUR"
        minute: "*/MINU"
        second: "*/SECO"

    latitude:
      query: "*/CLATH"

    longitude:
      query: "*/CLONH"

    satelliteId:
      query: "*/SAID"

    satelliteZenithAngle:
      query: "*/SAZA"

    sensorCentralFrequency:
      query: "*/SCCF"
      type: float

    pressure:
      query: "*/PRLC[1]"
      type: float

    # Processing Center
    dataProviderOrigin:
      query: '*/GCLONG'
    
    # Wind Generating Application
    windGeneratingApplication:
      query: '*/GNAP[1]'

    # Quality Information Without Forecast
    qualityInformationWithoutForecast:
      query: '*/LGRSQ4[1]{1}/PCCF'
      type: float

    # Wind Retrieval Method Information - Computation 
    windComputationMethod:
      query: '*/SWCM'

    # ObsValue - Wind Direction
    windDirection:
      query: '*/WDIR'
      type: float

    # ObsValue - Wind Speed
    windSpeed:
      query: '*/WSPD'

  splits:
    satId:
      category:
        variable: satelliteId
        map:
          _854: multi 

encoder:
  globals:
    - name: "description"
      type: string
      value: "High-latitude Atmospheric Motion Vectors (AMVs) derived from combined geostationary and low-earth polar-orbiting satellite imagery"

    - name: "platformCommonName"
      type: string
      value: "MultiSats"

    - name: "platformLongDescription"
      type: string
      value: "Combined Geostationary/Low-Earth Orbiting Operational Satellites"

    - name: "sensorCommonName"
      type: string
      value: "LEOGEO"

    - name: "sensorLongDescription"
      type: string
      value: "Multiple sensors from geostationary and low-earth orbiting satellites"

    - name: "source"
      type: string
      value: "U.S. National Weather Service, National Centres for Environmental Prediction (NCEP))"

    - name: "sourceFiles"
      type: string
      value: "NCEP BUFR Dump - satwnd NC005072"

    - name: "processingLevel"
      type: string
      value: "Level-2"

    - name: "converter"
      type: string
      value: "bufr-query"

  variables:

    # MetaData 
    - name: "MetaData/dateTime"
      source: variables/timestamp
      longName: "Datetime"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/latitude"
      source: variables/latitude
      longName: "Latitude"
      units: "degrees_north"
      range: [ -90, 90 ]

    - name: "MetaData/longitude"
      source: variables/longitude
      longName: "Longitude"
      units: "degrees_east"
      range: [ -180, 180 ]

    - name: "MetaData/satelliteIdentifier"
      source: variables/satelliteId
      longName: "Satellite Identifier"

    - name: "MetaData/satelliteZenithAngle"
      source: variables/satelliteZenithAngle
      longName: "Satellite Zenith Angle"
      units: "degree"
      range: [ 0, 90 ]

    - name: "MetaData/sensorCentralFrequency"
      source: variables/sensorCentralFrequency
      longName: "Satellite Channel Center Frequency"
      units: "Hz"

    - name: "MetaData/dataProviderOrigin"
      source: variables/dataProviderOrigin
      longName: "Identification of Originating/Generating Center"

    - name: "MetaData/windComputationMethod"
      source: variables/windComputationMethod
      longName: "Satellite-derived Wind Computation Method"

    - name: "MetaData/windGeneratingApplication"
      source: variables/windGeneratingApplication
      longName: "Wind Generating Application"

    - name: "MetaData/qiWithoutForecast"
      source: variables/qualityInformationWithoutForecast
      longName: "Quality Information Without Forecast"
      units: "percent"

    - name: "MetaData/pressure"
      source: variables/pressure
      longName: "Pressure"
      units: "Pa"

    - name: "ObsValue/windDirection"
      source: variables/windDirection
      longName: "Wind Direction"
      units: "degree"

    - name: "ObsValue/windSpeed"
      source: variables/windSpeed
      longName: "Wind Speed"
      units: "m s-1"
