bufr:
  subsets:
    - NC021044

  variables:
    # MetaData
    timestamp:
      datetime:
        year: "*/YEAR"
        month: "*/MNTH"
        day: "*/DAYS"
        hour: "*/HOUR"
        minute: "*/MINU"
        second: "*/SECO"

    dataReceiptTime:
      datetime:
        year: "*/RCYR"
        month: "*/RCMO"
        day: "*/RCDY"
        hour: "*/RCHR"
        minute: "*/RCMI"

    receiptTimeSignificance:
      query: "*/RCTS"

    latitude:
      query: "*/CLATH"

    longitude:
      query: "*/CLONH"

    satelliteId:
      query: "*/SAID"

    satelliteZenithAngle:
      query: "*/SAZA"

    solarZenithAngle:
      query: "*/SOZA"

    numberPixelHorizontal:
      query: "*/NPPR"

    numberPixelVertical:
      query: "*/NPPC"

    landOrSeaQualifier:
      query: "*/LSQL"

    geopotentialHeight:
      query: "*/HITE"

    reportIndicator:
      query: "*/CORN"

    sensorCentralFrequency:
      query: "*/RPSEQ11{1}/SCCF"

    sensorBandWidth:
      query: "*/RPSEQ11{1}/SCBW"

    satelliteInstrumentData:
      query: "*/RPSEQ11{1}/SIDP"

    radianceType:
      query: "*/RPSEQ11{1}/RDTP"

    radianceComputationalMethod:
      query: "*/RPSEQ11{1}/RDCM"

    # ObsValue   
    cloudType:
      query: "*/RPSEQ11{1}/CLTP"

    cloudAmount:
      query: "*/RPSEQ11{1}/CLDMNT"

    cloudFree:
      query: "*/RPSEQ11{1}/NCLDMNT"

    brightnessTemperature:
      query: "*/RPSEQ11{1}/TMBRST"

    clearSkyStandardDeviation:
      query: "*/RPSEQ11{1}/SDTB"

  splits:
    satId:
      category:
        variable: satelliteId
        map:
          _173: h8 
          _174: h9

encoder:

  globals:
    - name: "platformCommonName"
      type: string
      value: "Himawari"

    - name: "platformLongDescription"
      type: string
      value: "JMA HIMAWARI-8 Clear Sky Radiances (CSR)"

    - name: "sensor"
      type: string
      value: "Advanced Himawari Imager (AHI)"

    - name: "providerFullName"
      type: string
      value: "Japan Meteorological Agencyi (JMA)"

    - name: "source"
      type: string
      value: "U.S. National Weather Service, National Centres for Environmental Prediction (NCEP)"

    - name: "sourceFiles"
      type: string
      value: "NCEP BUFR Dump containing NC021044 subset for JMA HIMAWARI-8 Clear Sky Radiances (CSR)"

    - name: "processingLevel"
      type: string
      value: "Level-2"

    - name: "converter"
      type: string
      value: "bufr-query"

  variables:

    # MetaData
    - name: "MetaData/dateTime"
      source: variables/timestamp
      longName: "Datetime"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/dataReceiptTime"
      source: variables/dataReceiptTime
      longName: "Observation Receipt Time"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/receiptTimeSignificance"
      source: variables/receiptTimeSignificance
      longName: "Receipt Time Significance"

    - name: "MetaData/latitude"
      source: variables/latitude
      longName: "Latitude"
      units: "degrees_north"
      range: [ -90, 90 ]

    - name: "MetaData/longitude"
      source: variables/longitude
      longName: "Longitude"
      units: "degrees_east"
      range: [ -180, 180 ]

    - name: "MetaData/satelliteIdentifier"
      source: variables/satelliteId
      longName: "Satellite Identifier"

    - name: "MetaData/satelliteZenithAngle"
      source: variables/satelliteZenithAngle
      longName: "Satellite Zenith Angle"
      units: "degree"
      range: [ 0, 90 ]

    - name: "MetaData/solarZenithAngle"
      source: variables/solarZenithAngle
      longName: "Solar Zenith Angle"
      units: "degree"
      range: [0, 180]

    - name: "MetaData/numberPixelHorizontal"
      source: variables/numberPixelHorizontal
      longName: "Number Of Pixels Per Row"

    - name: "MetaData/numberPixelVertical"
      source: variables/numberPixelVertical
      longName: "Number Of Pixels Per Column"

    - name: "MetaData/landOrSeaQualifier"
      source: variables/landOrSeaQualifier
      longName: "Land/Sea Qualifier"

    - name: "MetaData/geopotentialHeight"
      source: variables/geopotentialHeight
      longName: "Geopotential Height"
      units: "m"

    - name: "MetaData/reportIndicator"
      source: variables/reportIndicator
      longName: "Corrected Report Indicator"

    - name: "MetaData/sensorCentralFrequency"
      source: variables/sensorCentralFrequency
      longName: "Satellite Channel Center Frequency"
      units: "Hz"

    - name: "MetaData/sensorBandWidth"
      source: variables/sensorBandWidth
      longName: "Satellite Channel Band Width"
      units: "Hz"

    - name: "MetaData/satelliteInstrumentData"
      source: variables/satelliteInstrumentData
      longName: "Satellite Instrument Data Used In Processing"

    - name: "MetaData/radianceType"
      source: variables/radianceType
      longName: "Radiance Type"

    - name: "MetaData/radianceComputationalMethod"
      source: variables/radianceComputationalMethod
      longName: "Radiance Computational Method"

    # ObsValue  
    - name: "ObsValue/cloudType"
      source: variables/cloudType
      longName: "Cloud Type"

    - name: "ObsValue/cloudAmount"
      source: variables/cloudAmount
      longName: "Cloud Amount in Segment"
      units: "1"

    - name: "ObsValue/cloudFree"
      source: variables/cloudFree
      longName: "Segment Amount Cloud Free"
      units: "1"

    - name: "ObsValue/brightnessTemperature"
      source: variables/brightnessTemperature
      longName: "Brightness Temperature"
      units: "K"

    - name: "ObsValue/clearSkyStandardDeviation"
      source: variables/clearSkyStandardDeviation
      longName: "Brightness Temperature Standard Deviation"
      units: "K"
