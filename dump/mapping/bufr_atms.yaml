bufr:
  variables:
    # MetaData
    timestamp:
      datetime:
        year: "*/YEAR"
        month: "*/MNTH"
        day: "*/DAYS"
        hour: "*/HOUR"
        minute: "*/MINU"
        second: "*/SECO"

    latitude:
      query: "*/CLATH"

    longitude:
      query: "*/CLONH"

    satelliteId:
      query: "*/SAID"

    fieldOfViewNumber:
      query: "*/FOVN"

    heightOfStation:
      query: "*/HMSL"
      type: float

    solarZenithAngle:
      query: "*/SOZA"

    solarAzimuthAngle:
      query: "*/SOLAZI"

    sensorZenithAngle:
      query: "*/SAZA"

    sensorAzimuthAngle:
      query: "*/BEARAZ"

    sensorScanAngle:
      sensorScanAngle:
        fieldOfViewNumber: "*/FOVN"
        scanStart: -52.725
        scanStep: 1.110
        sensor: atms

    sensorChannelNumber:
      query: "*/ATMSCH/CHNM"

    # ObsValue
    # Remapped Brightness Temperature
    remappedBT:
      remappedBrightnessTemperature:
        fieldOfViewNumber: "*/FOVN"
        sensorChannelNumber: "*/ATMSCH/CHNM"
        brightnessTemperature: "*/ATMSCH/TMBR"
        obsTime:
          year: "*/YEAR"
          month: "*/MNTH"
          day: "*/DAYS"
          hour: "*/HOUR"
          minute: "*/MINU"
          second: "*/SECO"

  splits:
    satId:
      category:
        variable: satelliteId
        map:
          _224: npp
          _225: n20
          _226: n21

encoder:
  dimensions:
    - name: Channel
      source: variables/sensorChannelNumber
      path: "*/ATMSCH"

  globals:
    - name: "description"
      type: string
      value: "ATMS Level-1B data processed using FFT-based beam convolution to standardize all channels to a common 3°×3° spatial resolution"

    - name: "platformCommonName"
      type: string
      value: "JPSS"

    - name: "platformLongDescription"
      type: string
      value: "Joint Polar Satellite System"

    - name: "sensorCommonName"
      type: string
      value: "ATMS"

    - name: "sensorLongDescription"
      type: string
      value: "Advanced Baseline Imager (ATMS) - 22 channels including the 54 and 183 GHz bands; cross-track scanning"

    - name: "source"
      type: string
      value: "U.S. National Weather Service, National Centres for Environmental Prediction (NCEP))"

    - name: "sourceFiles"
      type: string
      value: "NCEP BUFR Dump - atms NC021203 Normal Feed"

    - name: "processingLevel"
      type: string
      value: "Level-1B"

    - name: "converter"
      type: string
      value: "bufr-query"

  variables:
    # MetaData
    - name: "MetaData/dateTime"
      source: variables/timestamp
      longName: "Datetime"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/latitude"
      source: variables/latitude
      longName: "Latitude"
      units: "degree_north"
      range: [-90, 90]

    - name: "MetaData/longitude"
      source: variables/longitude
      longName: "Longitude"
      units: "degree_east"

    - name: "MetaData/satelliteIdentifier"
      source: variables/satelliteId
      longName: "Satellite Identifier"

    - name: "MetaData/sensorScanPosition"
      source: variables/fieldOfViewNumber
      longName: "Field of View Number"

    - name: "MetaData/sensorViewAngle"
      source: variables/sensorScanAngle
      longName: "Sensor View Angle"
      units: "degree"

    - name: "MetaData/heightOfStation"
      source: variables/heightOfStation
      longName: "Altitude of Satellite"
      units: "m"

    - name: "MetaData/solarZenithAngle"
      source: variables/solarZenithAngle
      longName: "Solar Zenith Angle"
      units: "degree"
      range: [0, 180]

    - name: "MetaData/solarAzimuthAngle"
      source: variables/solarAzimuthAngle
      longName: "Solar Azimuth Angle"
      units: "degree"
      range: [0, 360]

    - name: "MetaData/sensorZenithAngle"
      source: variables/sensorZenithAngle
      longName: "Sensor Zenith Angle"
      units: "degree"
      range: [0, 90]

    - name: "MetaData/sensorAzimuthAngle"
      source: variables/sensorAzimuthAngle
      longName: "Sensor Azimuth Angle"
      units: "degree"
      range: [0, 360]

    - name: "MetaData/sensorChannelNumber"
      source: variables/sensorChannelNumber
      longName: "Sensor Channel Number"

    # ObsValue
    # Remapped Brightness Temperature
    - name: "ObsValue/brightnessTemperature"
      source: variables/remappedBT
      longName: "3-by-3 Averaged Brightness Temperature"
      units: "K"
      chunks: [10000, 22]
