bufr:
  subsets:
    - NC005030
    - NC005031
    - NC005032
    - NC005034
    - NC005039

  variables:
    # MetaData
    timestamp:
      datetime:
        year: "*/YEAR"
        month: "*/MNTH"
        day: "*/DAYS"
        hour: "*/HOUR"
        minute: "*/MINU"
        second: "*/SECO"

    dataReceiptTime:
      datetime:
        year: "*/RCYR"
        month: "*/RCMO"
        day: "*/RCDY"
        hour: "*/RCHR"
        minute: "*/RCMI"

    latitude:
      query: "*/CLATH"

    longitude:
      query: "*/CLONH"

    satelliteId:
      query: "*/SAID"

    satelliteZenithAngle:
      query: "*/SAZA"

    sensorCentralFrequency:
      query: "*/SCCF"
      type: float

    pressure:
      query: "*/PRLC[1]"
      type: float

    # Processing Center
    dataProviderOrigin:
      query: '*/OGCE[1]'

    # Quality Information - Quality Indicator  
    qualityInformationWithoutForecast:
      query: '*/AMVQIC{2}/PCCF'
      type: float

    # Quality Information - Expected Error  
    expectedError:
      query: '*/AMVQIC{4}/PCCF'
      type: float

    # Derived Motion Wind (DMW) Intermediate Vectors - Coefficient of Variation
    coefficientOfVariation:
      query: '*/AMVIVR{1}/CVWD'

    # Wind Retrieval Method Information - Computation 
    windComputationMethod:
      query: '*/SWCM'

    # Wind Retrieval Method Information - Hight Assignment 
    windHeightAssignMethod:
      query: '*/EHAM'

    # ObsValue - Wind Direction
    windDirection:
      query: '*/WDIR'
      type: float

    # ObsValue - Wind Speed
    windSpeed:
      query: '*/WSPD'

  splits:
    satId:
      category:
        variable: satelliteId
        map:
          _270: goes-16 
          _271: goes-17 
          _272: goes-18 

encoder:
  globals:
    - name: "description"
      type: string
      value: "Atmospheric Motion Vectors (AMVs) derived from GOES ABI using five spectral bands: longwave IR (LWIR), shortwave IR (SWIR), water vapor/deep layer (WV/DL), water vapor/cloud top (WVCT) and visible"
 
    - name: "platformCommonName"
      type: string
      value: "GOES"

    - name: "platformLongDescription"
      type: string
      value: "Geostationary Operational Environmental Satellite"

    - name: "sensorCommonName"
      type: string
      value: "ABI"

    - name: "sensorLongDescription"
      type: string
      value: "Advanced Baseline Imager with 16 channels, balanced VIS, NIR, SWIR, MWIR and LWIR"

    - name: "source"
      type: string
      value: "U.S. National Weather Service, National Centres for Environmental Prediction (NCEP))"

    - name: "sourceFiles"
      type: string
      value: "NCEP BUFR Dump - satwnd: NC005030 (LWIR), NC005031(WV/DL), NC005032(VIS), NC005034(WV/CT), NC005039(SWIR) "

    - name: "processingLevel"
      type: string
      value: "Level-2"

    - name: "converter"
      type: string
      value: "bufr-query"

  variables:
    # MetaData 
    - name: "MetaData/dateTime"
      source: variables/timestamp
      longName: "Observation Time"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/dataReceiptTime"
      source: variables/dataReceiptTime
      longName: "Observation Receipt Time"
      units: "seconds since 1970-01-01T00:00:00Z"

    - name: "MetaData/latitude"
      source: variables/latitude
      longName: "Latitude"
      units: "degrees_north"
      range: [ -90, 90 ]

    - name: "MetaData/longitude"
      source: variables/longitude
      longName: "Longitude"
      units: "degrees_east"
      range: [ -180, 180 ]

    - name: "MetaData/satelliteIdentifier"
      source: variables/satelliteId
      longName: "Satellite Identifier"

    - name: "MetaData/satelliteZenithAngle"
      source: variables/satelliteZenithAngle
      longName: "Satellite Zenith Angle"
      units: "degree"
      range: [ 0, 90 ]

    - name: "MetaData/sensorCentralFrequency"
      source: variables/sensorCentralFrequency
      longName: "Satellite Channel Center Frequency"
      units: "Hz"

    - name: "MetaData/dataProviderOrigin"
      source: variables/dataProviderOrigin
      longName: "Identification of Originating/Generating Center"

    - name: "MetaData/qiWithoutForecast"
      source: variables/qualityInformationWithoutForecast
      longName: "Quality Information Without Forecast"
      units: "percent"

      # To DO: change to MetaData/windPercentConfidence (dimension: Location) 
    - name: "MetaData/expectedError"
      source: variables/expectedError
      longName: "Expected Error"
      units: "percent"

    - name: "MetaData/coefficientOfVariation"
      source: variables/coefficientOfVariation
      longName: "Coefficient of Variation - a measure of the variability of AMV data relative to its average value (large coefficients mean high uncertainity)"
      units: "1"

    - name: "MetaData/windComputationMethod"
      source: variables/windComputationMethod
      longName: "Satellite-derived Wind Computation Method"

    - name: "MetaData/windHeightAssignMethod"
      source: variables/windHeightAssignMethod
      longName: "Wind Height Assignment Method"

    - name: "MetaData/pressure"
      source: variables/pressure
      longName: "Pressure"
      units: "Pa"

    - name: "ObsValue/windDirection"
      source: variables/windDirection
      longName: "Wind Direction"
      units: "degree"

    - name: "ObsValue/windSpeed"
      source: variables/windSpeed
      longName: "Wind Speed"
      units: "m s-1"
