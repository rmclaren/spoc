bufr:
  variables:
    # MetaData
    timestamp:
      datetime:
        year: "*/YEAR"
        month: "*/MNTH"
        day: "*/DAYS"
        hour: "*/HOUR"
        minute: "*/MINU"
        second: "*/SECO"

    latitude:
      query: "*/CLATH"

    longitude:
      query: "*/CLONH"

    satelliteId:
      query: "*/SAID"

    scanLineNumber:
      query: "*/SLNM"

    fieldOfViewNumber:
      query: "*/FOVN"

    sensorChannelNumber:
      query: "*/CHNM"

#    brightnessTemperature:
#      query: "*/SSMISCHN/TMBR"

    sensorScanAngle:
      sensorScanAngle:
        fieldOfViewNumber: "*/FOVN"
        scanStart: 0.0 
        scanStep: 0.0 
        sensor: gmi

    remappedBT:
      remappedBrightnessTemperature:
        sensor: gmi
        method: 1
        satelliteId: "*/SAID"
        latitude: "*/CLATH"
        longitude: "*/CLONH"
        fieldOfViewNumber: "*/FOVN"
        sensorChannelNumber: "*/CHNM"
        brightnessTemperature: "*/TMBR"
        obsTime:
          year: "*/YEAR"
          month: "*/MNTH"
          day: "*/DAYS"
          hour: "*/HOUR"
          minute: "*/MINU"
          second: "*/SECO"

encoder:
  dimensions:
    - name: Channel
      source: variables/sensorChannelNumber  
  
  globals:
    - name: "platformCommonName"
      type: string
      value: "SSMIS-DMSP18"
  
    - name: "platformLongDescription"
      type: string
      value: "MTYP 021-201 DMSP SSM/IS Tb (UNIFIED PRE-PROCESSOR)"
  
  globals:
    - name: "platformCommonName"
      type: string
      value: "JPSS"

    - name: "platformLongDescription"
      type: string
      value: "Joint Polar Satellite System"

    - name: "sensor"
      type: string
      value: "Special Sensor Microwave Imager / Sounder (SSMIS)"

    - name: "source"
      type: string
      value: "NCEP BUFR Dump for SSMIS brightness temperature data (ssmisu)"

    - name: "providerFullName"
      type: string
      value: "National Environmental Satellite, Data, and Information Service"

    - name: "processingLevel"
      type: string
      value: "Level-1B"

    - name: "converter"
      type: string
      value: "BUFR"

  variables:
    # MetaData
    - name: "MetaData/dateTime"
      source: variables/timestamp
      longName: "Datetime"
      units: "seconds since 1970-01-01T00:00:00Z" 
  
    - name: "MetaData/latitude"
      source: variables/latitude
      longName: "Latitude"
      units: "degree_north"
      range: [-90, 90]
  
    - name: "MetaData/longitude"
      source: variables/longitude
      longName: "Longitude"
      units: "degree_east"
  
    - name: "MetaData/satelliteIdentifier"
      source: variables/satelliteId
      longName: "Satellite Identifier"
  
    - name: "MetaData/sensorScanPosition"
      source: variables/fieldOfViewNumber
      longName: "Field of View Number"
  
    - name: "MetaData/sensorChannelNumber"
      source: variables/sensorChannelNumber
      longName: "Sensor Channel Number"
  
    - name: "MetaData/sensorViewAngle"
      source: variables/sensorScanAngle
      longName: "Sensor View Angle"
      units: "degree"
  
    - name: "MetaData/scanLineNumber"
      source: variables/scanLineNumber
      longName: "Scan Line Number"
  
#    # ObsValue
#    # Brightness Temperature
#    - name: "ObsValue/brightnessTemperature"
#      source: variables/brightnessTemperature
#      longName: "Brightness Temperature"
#      units: "K"
#      range: [120, 500]
#      chunks: [10000, 24]

    # ObsValue
    # Remapped Brightness Temperature
    - name: "ObsValue/brightnessTemperature"
      source: variables/remappedBT
      longName: "3-by-3 Averaged Brightness Temperature"
      units: "K"
      range: [120, 500]
      chunks: [10000, 24]
